<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="fireGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f7931e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcc02;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="grillGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#8b4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="smokeGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#cccccc;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="300" fill="#2c1810"/>
  
  <!-- 桌面 -->
  <ellipse cx="200" cy="280" rx="180" ry="15" fill="#8b4513" opacity="0.6"/>
  
  <!-- 小火炉底座 -->
  <ellipse cx="200" cy="220" rx="80" ry="12" fill="#333"/>
  <rect x="120" y="200" width="160" height="20" fill="url(#grillGradient)" rx="10"/>
  
  <!-- 火炉网格 -->
  <ellipse cx="200" cy="200" rx="70" ry="8" fill="#444" stroke="#666" stroke-width="2"/>
  <line x1="140" y1="200" x2="260" y2="200" stroke="#666" stroke-width="1"/>
  <line x1="170" y1="195" x2="170" y2="205" stroke="#666" stroke-width="1"/>
  <line x1="200" y1="195" x2="200" y2="205" stroke="#666" stroke-width="1"/>
  <line x1="230" y1="195" x2="230" y2="205" stroke="#666" stroke-width="1"/>
  
  <!-- 炭火 -->
  <ellipse cx="180" cy="195" rx="8" ry="4" fill="url(#fireGradient)"/>
  <ellipse cx="200" cy="192" rx="10" ry="5" fill="url(#fireGradient)"/>
  <ellipse cx="220" cy="195" rx="8" ry="4" fill="url(#fireGradient)"/>
  <ellipse cx="190" cy="198" rx="6" ry="3" fill="url(#fireGradient)"/>
  <ellipse cx="210" cy="198" rx="6" ry="3" fill="url(#fireGradient)"/>
  
  <!-- 火焰 -->
  <path d="M180 195 Q175 180 180 170 Q185 175 190 170 Q185 180 180 195" fill="#ff4500" opacity="0.8"/>
  <path d="M200 192 Q195 175 200 160 Q205 170 210 160 Q205 175 200 192" fill="#ff6b35" opacity="0.9"/>
  <path d="M220 195 Q215 180 220 170 Q225 175 230 170 Q225 180 220 195" fill="#ff4500" opacity="0.8"/>
  
  <!-- 烤串 -->
  <rect x="160" y="185" width="80" height="4" fill="#8b4513" rx="2"/>
  <circle cx="170" cy="187" r="3" fill="#d2691e"/>
  <circle cx="180" cy="187" r="3" fill="#cd853f"/>
  <circle cx="190" cy="187" r="3" fill="#d2691e"/>
  <circle cx="200" cy="187" r="3" fill="#8b4513"/>
  <circle cx="210" cy="187" r="3" fill="#d2691e"/>
  <circle cx="220" cy="187" r="3" fill="#cd853f"/>
  <circle cx="230" cy="187" r="3" fill="#d2691e"/>
  
  <!-- 第二根烤串 -->
  <rect x="150" y="175" width="100" height="4" fill="#8b4513" rx="2"/>
  <circle cx="165" cy="177" r="3" fill="#ff6347"/>
  <circle cx="175" cy="177" r="3" fill="#d2691e"/>
  <circle cx="185" cy="177" r="3" fill="#ff6347"/>
  <circle cx="195" cy="177" r="3" fill="#8b4513"/>
  <circle cx="205" cy="177" r="3" fill="#ff6347"/>
  <circle cx="215" cy="177" r="3" fill="#d2691e"/>
  <circle cx="225" cy="177" r="3" fill="#ff6347"/>
  <circle cx="235" cy="177" r="3" fill="#8b4513"/>
  
  <!-- 烟雾 -->
  <path d="M180 170 Q175 150 180 130 Q185 140 190 120 Q185 135 180 115 Q175 125 180 105" 
        stroke="url(#smokeGradient)" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M200 160 Q195 140 200 120 Q205 130 210 110 Q205 125 200 105 Q195 115 200 95" 
        stroke="url(#smokeGradient)" stroke-width="4" fill="none" opacity="0.7"/>
  <path d="M220 170 Q215 150 220 130 Q225 140 230 120 Q225 135 220 115 Q215 125 220 105" 
        stroke="url(#smokeGradient)" stroke-width="3" fill="none" opacity="0.6"/>
  
  <!-- 装饰性火花 -->
  <circle cx="160" cy="160" r="1" fill="#ffcc02" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="240" cy="155" r="1" fill="#ff6b35" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="145" r="1" fill="#ffcc02" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- 标题文字 -->
  <text x="200" y="50" text-anchor="middle" fill="#ff6b35" font-family="serif" font-size="24" font-weight="bold">小火炉</text>
  <text x="200" y="75" text-anchor="middle" fill="#f7931e" font-family="serif" font-size="14">每桌独立 · 活烧烤</text>
</svg>