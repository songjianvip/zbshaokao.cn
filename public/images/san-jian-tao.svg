<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="breadGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#f4e4bc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a574;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="sauceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a0522d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="onionGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90ee90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228b22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="300" fill="#f5f5dc"/>
  
  <!-- 桌面阴影 -->
  <ellipse cx="200" cy="280" rx="150" ry="10" fill="#ddd" opacity="0.5"/>
  
  <!-- 小饼 -->
  <ellipse cx="200" cy="180" rx="80" ry="60" fill="url(#breadGradient)" stroke="#d4a574" stroke-width="2"/>
  <ellipse cx="200" cy="175" rx="75" ry="55" fill="#f4e4bc" opacity="0.8"/>
  
  <!-- 小饼纹理 -->
  <path d="M140 160 Q200 150 260 160" stroke="#d4a574" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M145 180 Q200 170 255 180" stroke="#d4a574" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M150 200 Q200 190 250 200" stroke="#d4a574" stroke-width="1" fill="none" opacity="0.6"/>
  
  <!-- 烤肉串在小饼上 -->
  <rect x="160" y="170" width="80" height="6" fill="#8b4513" rx="3"/>
  <circle cx="170" cy="173" r="4" fill="#cd853f"/>
  <circle cx="185" cy="173" r="4" fill="#d2691e"/>
  <circle cx="200" cy="173" r="4" fill="#cd853f"/>
  <circle cx="215" cy="173" r="4" fill="#8b4513"/>
  <circle cx="230" cy="173" r="4" fill="#d2691e"/>
  
  <!-- 蘸料 -->
  <ellipse cx="120" cy="120" rx="25" ry="15" fill="url(#sauceGradient)"/>
  <ellipse cx="120" cy="115" rx="20" ry="12" fill="#a0522d"/>
  <circle cx="115" cy="112" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="125" cy="118" r="1.5" fill="#fff" opacity="0.6"/>
  
  <!-- 小葱 -->
  <rect x="280" y="100" width="8" height="80" fill="url(#onionGradient)" rx="4"/>
  <rect x="290" y="95" width="8" height="85" fill="url(#onionGradient)" rx="4"/>
  <rect x="300" y="105" width="8" height="75" fill="url(#onionGradient)" rx="4"/>
  
  <!-- 小葱叶子细节 -->
  <ellipse cx="284" cy="105" rx="2" ry="8" fill="#90ee90"/>
  <ellipse cx="294" cy="100" rx="2" ry="8" fill="#90ee90"/>
  <ellipse cx="304" cy="110" rx="2" ry="8" fill="#90ee90"/>
  
  <!-- 包裹动作示意 -->
  <path d="M140 140 Q180 120 220 140 Q240 160 220 180 Q180 200 140 180 Q120 160 140 140" 
        stroke="#d4a574" stroke-width="3" fill="none" stroke-dasharray="5,5" opacity="0.7"/>
  
  <!-- 装饰性元素 -->
  <circle cx="80" cy="80" r="3" fill="#ff6b35" opacity="0.6"/>
  <circle cx="320" cy="70" r="2" fill="#228b22" opacity="0.7"/>
  <circle cx="350" cy="200" r="2.5" fill="#8b4513" opacity="0.5"/>
  
  <!-- 香味线条 -->
  <path d="M170 150 Q175 130 170 110" stroke="#ff6b35" stroke-width="2" fill="none" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M200 150 Q205 130 200 110" stroke="#ff6b35" stroke-width="2" fill="none" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.8s" repeatCount="indefinite"/>
  </path>
  <path d="M230 150 Q235 130 230 110" stroke="#ff6b35" stroke-width="2" fill="none" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.2s" repeatCount="indefinite"/>
  </path>
  
  <!-- 标题文字 -->
  <text x="200" y="40" text-anchor="middle" fill="#8b4513" font-family="serif" font-size="24" font-weight="bold">三件套</text>
  <text x="200" y="65" text-anchor="middle" fill="#a0522d" font-family="serif" font-size="14">小饼 · 小葱 · 酱</text>
  
  <!-- 标签 -->
  <text x="120" y="95" text-anchor="middle" fill="#654321" font-family="serif" font-size="12">蘸料</text>
  <text x="294" y="90" text-anchor="middle" fill="#228b22" font-family="serif" font-size="12">小葱</text>
  <text x="200" y="250" text-anchor="middle" fill="#d4a574" font-family="serif" font-size="12">小饼</text>
</svg>