<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 肉类渐变 -->
    <radialGradient id="meatGradient" cx="40%" cy="30%" r="80%">
      <stop offset="0%" style="stop-color:#ff7675;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#e84393;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#d63031;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0522d;stop-opacity:1" />
    </radialGradient>
    
    <!-- 脂肪渐变 -->
    <linearGradient id="fatGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fffbf0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fff8dc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5deb3;stop-opacity:1" />
    </linearGradient>
    
    <!-- 烤制效果渐变 -->
    <radialGradient id="grilledGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#8b4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a0522d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </radialGradient>
    
    <!-- 调料渐变 -->
    <radialGradient id="spiceGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e67e22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d35400;stop-opacity:1" />
    </radialGradient>
    
    <!-- 盘子渐变 -->
    <radialGradient id="plateGradient" cx="50%" cy="30%" r="80%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#f8f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6e6fa;stop-opacity:1" />
    </radialGradient>
    
    <!-- 阴影渐变 -->
    <radialGradient id="shadowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
    
    <!-- 腌料瓶渐变 -->
    <linearGradient id="bottleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#654321;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3e2723;stop-opacity:1" />
    </linearGradient>
    
    <!-- 火焰效果 -->
    <radialGradient id="fireGradient" cx="50%" cy="80%" r="60%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#f7931e;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ffcc02;stop-opacity:0.3" />
    </radialGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="300" fill="url(#fireGradient)"/>
  <rect width="400" height="300" fill="#1a0e0a" opacity="0.8"/>
  
  <!-- 桌面阴影 -->
  <ellipse cx="200" cy="280" rx="180" ry="15" fill="url(#shadowGradient)"/>
  
  <!-- 盘子 -->
  <ellipse cx="200" cy="225" rx="130" ry="65" fill="url(#shadowGradient)"/>
  <ellipse cx="200" cy="220" rx="125" ry="60" fill="url(#plateGradient)" stroke="#ddd" stroke-width="3"/>
  <ellipse cx="200" cy="215" rx="115" ry="55" fill="#ffffff" opacity="0.9"/>
  <ellipse cx="200" cy="212" rx="105" ry="50" fill="#f8f8ff" opacity="0.6"/>
  
  <!-- 盘子高光 -->
  <ellipse cx="180" cy="200" rx="30" ry="15" fill="#ffffff" opacity="0.4"/>
  <ellipse cx="220" cy="205" rx="20" ry="10" fill="#ffffff" opacity="0.3"/>
  
  <!-- 带皮五花肉片 - 第一片 -->
  <g transform="rotate(-5 160 192)">
    <!-- 阴影 -->
    <rect x="142" y="182" width="40" height="25" fill="url(#shadowGradient)" rx="3"/>
    <!-- 主体 -->
    <rect x="140" y="180" width="40" height="25" fill="url(#meatGradient)" rx="3"/>
    <!-- 脂肪层 -->
    <rect x="140" y="180" width="40" height="8" fill="url(#fatGradient)" rx="2"/>
    <rect x="140" y="192" width="40" height="5" fill="url(#meatGradient)"/>
    <rect x="140" y="200" width="40" height="5" fill="url(#fatGradient)"/>
    <!-- 烤制痕迹 -->
    <rect x="145" y="185" width="30" height="2" fill="url(#grilledGradient)" opacity="0.8"/>
    <rect x="148" y="195" width="25" height="1.5" fill="url(#grilledGradient)" opacity="0.6"/>
    <!-- 高光 -->
    <ellipse cx="155" cy="185" rx="8" ry="3" fill="#ffffff" opacity="0.3"/>
  </g>
  
  <!-- 带皮五花肉片 - 第二片 (中心主角) -->
  <g transform="rotate(2 212 189)">
    <!-- 阴影 -->
    <rect x="192" y="177" width="45" height="28" fill="url(#shadowGradient)" rx="3"/>
    <!-- 主体 -->
    <rect x="190" y="175" width="45" height="28" fill="url(#meatGradient)" rx="3"/>
    <!-- 脂肪层 -->
    <rect x="190" y="175" width="45" height="9" fill="url(#fatGradient)" rx="2"/>
    <rect x="190" y="188" width="45" height="6" fill="url(#meatGradient)"/>
    <rect x="190" y="198" width="45" height="5" fill="url(#fatGradient)"/>
    <!-- 烤制痕迹 -->
    <rect x="195" y="180" width="35" height="2.5" fill="url(#grilledGradient)" opacity="0.9"/>
    <rect x="198" y="190" width="30" height="2" fill="url(#grilledGradient)" opacity="0.7"/>
    <!-- 高光 -->
    <ellipse cx="210" cy="182" rx="10" ry="4" fill="#ffffff" opacity="0.4"/>
    <ellipse cx="205" cy="195" rx="6" ry="2" fill="#ffffff" opacity="0.2"/>
  </g>
  
  <!-- 带皮五花肉片 - 第三片 -->
  <g transform="rotate(8 266 195)">
    <!-- 阴影 -->
    <rect x="247" y="184" width="42" height="26" fill="url(#shadowGradient)" rx="3"/>
    <!-- 主体 -->
    <rect x="245" y="182" width="42" height="26" fill="url(#meatGradient)" rx="3"/>
    <!-- 脂肪层 -->
    <rect x="245" y="182" width="42" height="8" fill="url(#fatGradient)" rx="2"/>
    <rect x="245" y="194" width="42" height="6" fill="url(#meatGradient)"/>
    <rect x="245" y="203" width="42" height="5" fill="url(#fatGradient)"/>
    <!-- 烤制痕迹 -->
    <rect x="250" y="187" width="32" height="2" fill="url(#grilledGradient)" opacity="0.8"/>
    <rect x="252" y="197" width="28" height="1.5" fill="url(#grilledGradient)" opacity="0.6"/>
    <!-- 高光 -->
    <ellipse cx="260" cy="187" rx="7" ry="3" fill="#ffffff" opacity="0.3"/>
  </g>
  
  <!-- 孜然调料颗粒 -->
  <g opacity="0.9">
    <circle cx="160" cy="170" r="2.5" fill="url(#spiceGradient)"/>
    <circle cx="165" cy="168" r="2" fill="url(#spiceGradient)"/>
    <circle cx="170" cy="172" r="2.5" fill="url(#spiceGradient)"/>
    <circle cx="220" cy="165" r="2.2" fill="url(#spiceGradient)"/>
    <circle cx="225" cy="170" r="1.8" fill="url(#spiceGradient)"/>
    <circle cx="260" cy="168" r="2.5" fill="url(#spiceGradient)"/>
    <circle cx="175" cy="165" r="1.5" fill="url(#spiceGradient)"/>
    <circle cx="235" cy="167" r="1.8" fill="url(#spiceGradient)"/>
    <circle cx="250" cy="172" r="2" fill="url(#spiceGradient)"/>
  </g>
  
  <!-- 调料粉末效果 -->
  <g opacity="0.6">
    <circle cx="162" cy="172" r="0.8" fill="#D2691E"/>
    <circle cx="168" cy="170" r="0.6" fill="#D2691E"/>
    <circle cx="222" cy="167" r="0.7" fill="#D2691E"/>
    <circle cx="258" cy="170" r="0.8" fill="#D2691E"/>
  </g>
  
  <!-- 腌料瓶组合 -->
  <g transform="translate(315, 100)">
    <!-- 瓶子阴影 -->
    <rect x="2" y="22" width="25" height="40" fill="url(#shadowGradient)" rx="3"/>
    <!-- 主瓶身 -->
    <rect x="0" y="20" width="25" height="40" fill="url(#bottleGradient)" rx="3"/>
    <!-- 瓶身高光 -->
    <rect x="3" y="25" width="4" height="30" fill="#ffffff" opacity="0.3" rx="2"/>
    <!-- 瓶盖 -->
    <rect x="2" y="15" width="21" height="8" fill="#8B4513" rx="2"/>
    <rect x="4" y="17" width="17" height="4" fill="#A0522D" rx="1"/>
    <!-- 瓶盖顶部 -->
    <circle cx="12.5" cy="19" r="3.5" fill="#654321"/>
    <circle cx="12.5" cy="18" r="2.5" fill="#8B4513"/>
    <!-- 标签 -->
    <rect x="5" y="35" width="15" height="12" fill="#ffffff" opacity="0.8" rx="1"/>
    <text x="12.5" y="42" text-anchor="middle" font-family="Arial" font-size="6" fill="#8B4513">秘制</text>
    <text x="12.5" y="47" text-anchor="middle" font-family="Arial" font-size="6" fill="#8B4513">腌料</text>
  </g>
  
  <!-- 第二个调料瓶 -->
  <g transform="translate(350, 110)">
    <rect x="2" y="17" width="20" height="35" fill="url(#shadowGradient)" rx="2"/>
    <rect x="0" y="15" width="20" height="35" fill="url(#spiceGradient)" rx="2"/>
    <rect x="2" y="18" width="3" height="25" fill="#ffffff" opacity="0.2" rx="1"/>
    <rect x="2" y="10" width="16" height="6" fill="#8B4513" rx="1"/>
    <circle cx="10" cy="13" r="2.5" fill="#654321"/>
  </g>
  
  <!-- 香味线条 - 更丰富的效果 -->
  <g opacity="0.8">
    <path d="M 180 150 Q 185 140 190 150 Q 195 140 200 150" stroke="#daa520" stroke-width="2" fill="none"/>
    <path d="M 210 145 Q 215 135 220 145 Q 225 135 230 145" stroke="#daa520" stroke-width="2" fill="none"/>
    <path d="M 250 148 Q 255 138 260 148 Q 265 138 270 148" stroke="#daa520" stroke-width="2" fill="none"/>
    <!-- 额外的香味线 -->
    <path d="M 170 155 Q 175 145 180 155" stroke="#daa520" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 240 150 Q 245 140 250 150" stroke="#daa520" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>
  
  <!-- 油脂滴落效果 - 增强版 -->
  <g opacity="0.8">
    <ellipse cx="175" cy="210" rx="3.5" ry="6" fill="#ffcc02"/>
    <ellipse cx="215" cy="208" rx="3" ry="5" fill="#ffcc02"/>
    <ellipse cx="255" cy="212" rx="3.5" ry="6" fill="#ffcc02"/>
    <!-- 小油滴 -->
    <circle cx="180" cy="218" r="1.5" fill="#ffcc02" opacity="0.6"/>
    <circle cx="210" cy="216" r="1.2" fill="#ffcc02" opacity="0.6"/>
    <circle cx="250" cy="220" r="1.5" fill="#ffcc02" opacity="0.6"/>
  </g>
  
  <!-- 火花效果 -->
  <g opacity="0.7">
    <circle cx="185" cy="160" r="1" fill="#FFD700"/>
    <circle cx="225" cy="155" r="0.8" fill="#FFA500"/>
    <circle cx="265" cy="158" r="1" fill="#FFD700"/>
    <path d="M 185 160 L 187 158 L 185 156 L 183 158 Z" fill="#FFD700"/>
    <path d="M 225 155 L 227 153 L 225 151 L 223 153 Z" fill="#FFA500"/>
  </g>
  
  <!-- 装饰性星星 -->
  <path d="M50 60 L52 66 L58 66 L53 70 L55 76 L50 72 L45 76 L47 70 L42 66 L48 66 Z" fill="#daa520" opacity="0.8"/>
  <path d="M350 80 L352 86 L358 86 L353 90 L355 96 L350 92 L345 96 L347 90 L342 86 L348 86 Z" fill="#daa520" opacity="0.8"/>
  
  <!-- 标题文字 - 增强版 -->
  <text x="200" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFD700">天选之子</text>
  <text x="200" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFA500" opacity="0.9">带皮五花肉的极致诱惑</text>
  <text x="200" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFD700" opacity="0.7">肥瘦相间 · 香嫩多汁 · 回味无穷</text>
  
  <!-- 标签 -->
  <text x="327" y="95" text-anchor="middle" fill="#654321" font-family="serif" font-size="10">秘制腌料</text>
  <text x="360" y="105" text-anchor="middle" fill="#8b4513" font-family="serif" font-size="10">孜然调料</text>
</svg>